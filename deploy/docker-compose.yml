services:
  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/mindskip/mysql:8.0.33
    container_name: xzs-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "doushijiaxiang0."
      MYSQL_DATABASE: "xzs"
      TZ: "Asia/Shanghai"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - xzs-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xzs-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/xzs?useSSL=false&useUnicode=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&allowPublicKeyRetrieval=true&allowMultiQueries=true"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "doushijiaxiang0."
      TZ: "Asia/Shanghai"
    volumes:
      - ./logs:/var/log/xzs
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      mysql:
        condition: service_started
    networks:
      - xzs-net

  nginx:
    image: nginx:1.25-alpine
    container_name: xzs-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend
    networks:
      - xzs-net

networks:
  xzs-net:
    driver: bridge
